<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Five parts of a clear basketball practice plan</title>
  <desc id="desc">A five-step flow from goal through progression, timing, constraints, and coaching cues to a connected practice.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#090909"/><stop offset="1" stop-color="#161616"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f57520"/><stop offset="1" stop-color="#ff9a4f"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".38"/></filter>
  </defs>
  <rect width="1400" height="620" rx="36" fill="url(#background)"/>
  <circle cx="1245" cy="80" r="210" fill="#f57520" opacity=".045"/><circle cx="115" cy="570" r="250" fill="#2d32f1" opacity=".04"/>
  <text x="70" y="82" fill="#f57520" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="800" letter-spacing="3">PRACTICE PLANNING FRAMEWORK</text>
  <text x="70" y="135" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="38" font-weight="800">Five decisions that turn drills into a practice</text>
  <text x="70" y="176" fill="#a9a9af" font-family="Inter,Arial,sans-serif" font-size="22">Every segment should connect to the same learning thread.</text>
  <path d="M172 332H1228" stroke="#343438" stroke-width="10" stroke-linecap="round"/><path d="M172 332H1228" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity=".85"/>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(70 238)"><rect width="220" height="188" rx="22" fill="#171719" stroke="#f57520" stroke-width="2"/><circle cx="110" cy="0" r="31" fill="#f57520"/><text x="110" y="9" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">1</text><text x="110" y="69" text-anchor="middle" fill="#fff" font-size="27" font-weight="800">GOAL</text><text x="110" y="108" text-anchor="middle" fill="#b7b7bc" font-size="17">Name the game</text><text x="110" y="134" text-anchor="middle" fill="#b7b7bc" font-size="17">behavior to improve</text></g>
    <g transform="translate(330 238)"><rect width="220" height="188" rx="22" fill="#171719" stroke="#4b4b51" stroke-width="2"/><circle cx="110" cy="0" r="31" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="110" y="9" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">2</text><text x="110" y="69" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">PROGRESSION</text><text x="110" y="108" text-anchor="middle" fill="#b7b7bc" font-size="17">Build toward more</text><text x="110" y="134" text-anchor="middle" fill="#b7b7bc" font-size="17">game-like decisions</text></g>
    <g transform="translate(590 238)"><rect width="220" height="188" rx="22" fill="#171719" stroke="#4b4b51" stroke-width="2"/><circle cx="110" cy="0" r="31" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="110" y="9" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">3</text><text x="110" y="69" text-anchor="middle" fill="#fff" font-size="27" font-weight="800">TIMING</text><text x="110" y="108" text-anchor="middle" fill="#b7b7bc" font-size="17">Protect play time</text><text x="110" y="134" text-anchor="middle" fill="#b7b7bc" font-size="17">and transitions</text></g>
    <g transform="translate(850 238)"><rect width="220" height="188" rx="22" fill="#171719" stroke="#4b4b51" stroke-width="2"/><circle cx="110" cy="0" r="31" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="110" y="9" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">4</text><text x="110" y="69" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">CONSTRAINTS</text><text x="110" y="108" text-anchor="middle" fill="#b7b7bc" font-size="17">Invite behavior</text><text x="110" y="134" text-anchor="middle" fill="#b7b7bc" font-size="17">without removing reads</text></g>
    <g transform="translate(1110 238)"><rect width="220" height="188" rx="22" fill="#171719" stroke="#4b4b51" stroke-width="2"/><circle cx="110" cy="0" r="31" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="110" y="9" text-anchor="middle" fill="#fff" font-size="25" font-weight="800">5</text><text x="110" y="62" text-anchor="middle" fill="#fff" font-size="21" font-weight="800">COACHING</text><text x="110" y="88" text-anchor="middle" fill="#fff" font-size="21" font-weight="800">CUES</text><text x="110" y="124" text-anchor="middle" fill="#b7b7bc" font-size="17">Observe, ask, and</text><text x="110" y="150" text-anchor="middle" fill="#b7b7bc" font-size="17">keep feedback focused</text></g>
  </g>
  <g transform="translate(403 493)"><rect width="594" height="76" rx="38" fill="#111113" stroke="#343438"/><circle cx="48" cy="38" r="19" fill="#f57520"/><path d="M39 38l7 7 13-15" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="82" y="47" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="700">One goal. One connected learning thread.</text></g>
</svg>
