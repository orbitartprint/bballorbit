<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1420" viewBox="0 0 720 1420" role="img" aria-labelledby="title desc">
  <title id="title">Five parts of a clear basketball practice plan</title>
  <desc id="desc">A vertical five-step flow from goal through progression, timing, constraints, and coaching cues to a connected practice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#090909"/><stop offset="1" stop-color="#171719"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".36"/></filter>
  </defs>
  <rect width="720" height="1420" rx="34" fill="url(#bg)"/>
  <circle cx="650" cy="80" r="180" fill="#f57520" opacity=".05"/>
  <text x="52" y="70" fill="#f57520" font-family="Inter,Arial,sans-serif" font-size="23" font-weight="800" letter-spacing="3">PRACTICE PLANNING</text>
  <text x="52" y="128" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="800">Five decisions that turn</text>
  <text x="52" y="176" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="40" font-weight="800">drills into a practice</text>
  <text x="52" y="220" fill="#aaaab0" font-family="Inter,Arial,sans-serif" font-size="25">Build one connected learning thread.</text>
  <path d="M96 324V1170" stroke="#f57520" stroke-width="5" opacity=".7"/>
  <g font-family="Inter,Arial,sans-serif" filter="url(#s)">
    <g transform="translate(52 276)"><rect x="44" width="572" height="168" rx="24" fill="#18181b" stroke="#f57520" stroke-width="3"/><circle cx="44" cy="84" r="38" fill="#f57520"/><text x="44" y="95" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">1</text><text x="112" y="70" fill="#fff" font-size="34" font-weight="800">GOAL</text><text x="112" y="111" fill="#b8b8be" font-size="25">Name the game behavior to improve</text></g>
    <g transform="translate(52 472)"><rect x="44" width="572" height="168" rx="24" fill="#18181b" stroke="#45454b" stroke-width="2"/><circle cx="44" cy="84" r="38" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="44" y="95" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">2</text><text x="112" y="70" fill="#fff" font-size="31" font-weight="800">PROGRESSION</text><text x="112" y="111" fill="#b8b8be" font-size="25">Build toward game-like decisions</text></g>
    <g transform="translate(52 668)"><rect x="44" width="572" height="168" rx="24" fill="#18181b" stroke="#45454b" stroke-width="2"/><circle cx="44" cy="84" r="38" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="44" y="95" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">3</text><text x="112" y="70" fill="#fff" font-size="34" font-weight="800">TIMING</text><text x="112" y="111" fill="#b8b8be" font-size="25">Protect play time and transitions</text></g>
    <g transform="translate(52 864)"><rect x="44" width="572" height="168" rx="24" fill="#18181b" stroke="#45454b" stroke-width="2"/><circle cx="44" cy="84" r="38" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="44" y="95" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">4</text><text x="112" y="70" fill="#fff" font-size="31" font-weight="800">CONSTRAINTS</text><text x="112" y="111" fill="#b8b8be" font-size="25">Invite behavior without removing reads</text></g>
    <g transform="translate(52 1060)"><rect x="44" width="572" height="168" rx="24" fill="#18181b" stroke="#45454b" stroke-width="2"/><circle cx="44" cy="84" r="38" fill="#252529" stroke="#f57520" stroke-width="3"/><text x="44" y="95" text-anchor="middle" fill="#fff" font-size="30" font-weight="800">5</text><text x="112" y="67" fill="#fff" font-size="29" font-weight="800">COACHING CUES</text><text x="112" y="108" fill="#b8b8be" font-size="24">Observe, ask, keep feedback focused</text></g>
  </g>
  <g transform="translate(52 1280)"><rect width="616" height="86" rx="43" fill="#111113" stroke="#3b3b40"/><circle cx="46" cy="43" r="21" fill="#f57520"/><path d="M36 43l8 8 15-17" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="82" y="52" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="700">One goal. One connected practice.</text></g>
</svg>
