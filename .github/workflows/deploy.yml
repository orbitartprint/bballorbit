name: Deploy to GitHub Pages

on:
  # manueller Start bleibt möglich
  workflow_dispatch:

  # geplanter Deploy: jeden Sonntag 16:00 UTC
  # = 17:00 deutsche Zeit im Winter (CET)
  # = 18:00 deutsche Zeit im Sommer (CEST)
  schedule:
    - cron: "0 16 * * 0"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_ACCOUNT_DELETION_REQUEST_URL: ${{ vars.VITE_ACCOUNT_DELETION_REQUEST_URL }}
      
      - name: Pre-render routes
        run: node scripts/prerender.js

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Debug build output
        run: |
          echo "Listing contents of the root directory..."
          ls -la
          echo "Listing contents of the dist directory..."
          ls -R dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: ./dist
          cname: bballorbit.com
          force_orphan: true
