name: Sync drill library from bballorbit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * 0' # Sunday 16:00 UTC = 17:00 CET / 18:00 CEST

jobs:
  sync-files:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: orbitartprint/bballorbit
          path: source-repo

      - name: Verify source paths
        run: |
          test -f source-repo/src/data/drills.ts
          test -d source-repo/public/drills
          test -d source-repo/public/videos

      - name: Create target directories
        run: |
          mkdir -p src/data
          mkdir -p public/drills
          mkdir -p public/videos

      - name: Copy drills.ts
        run: |
          cp source-repo/src/data/drills.ts src/data/drills.ts

      - name: Sync drill images
        run: |
          rsync -av --delete source-repo/public/drills/ public/drills/

      - name: Sync drill videos
        run: |
          rsync -av --delete source-repo/public/videos/ public/videos/

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/drills.ts public/drills public/videos
          git diff --cached --quiet || git commit -m "Sync drill library from bballorbit"

      - name: Push changes
        run: |
          git push
