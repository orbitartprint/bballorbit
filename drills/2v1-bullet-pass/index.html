  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v1 Bullet Pass","description":"Fast 2v1 that forces instant spacing + a quick, accurate pass under pressure.\nMain Goal\nTrain quick spacing and a high-quality 'bullet pass' to beat a recovering defender, while teaching the defender to read and choose between stopping the ","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/f8c4c463-5e25-47d7-90c9-beb05fb24649/thumb-1783090942799.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"1. The rep starts when O1 begins dribbling forward. At that moment, O2 and X1 are allowed to move as well."},{"@type":"HowToStep","name":"Phase 2","text":"1. It becomes a live 2v1. The two offensive players must immediately create good spacing (two lanes) and attack fast.\n2. The defender must read the situation and decide: deny the pass (take away the lane) or protect the rim.\n3. Play until a score or stop, then rotate roles."},{"@type":"HowToStep","name":"Phase 3","text":"Start swap: Off-ball attacker (O2) and defender (X1) switch starting positions to change angles and reads."},{"@type":"HowToStep","name":"Phase 4","text":"Constraints\n1. Mandatory pass: The ball-handler is NOT allowed to finish. He must pass for the final shot.\n2. Limited dribbles: Ball-handler has max 1–2 dribbles before he must pass.\n3. Finish constraint: Offense must finish with a layup (no pull-ups).\n4. Initiator variation: Change who triggers the drill (e.g., O2 moves first, then O1 can dribble; or X1 moves first).\n5. Passing focus: Count only 'bullet passes' (on time, on target). If the pass floats or is late, it’s an automatic stop / no point."}]}</script>
