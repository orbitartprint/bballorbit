  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v2 Chair Chase","description":"A competitive 2v2 drill that creates an immediate advantage and forces all four players to make quick decisions.\nMain Goal\nHelp players recognize and use an early advantage in a live 2v2 situation while improving spacing, communication, and","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/0e606d61-c5eb-4cab-86e9-dc6c0bbdd0b4/thumb-1782995473054.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"The first defender starts the drill by choosing one side and running around the chair. As soon as the defender moves, the drill is live. The offense must immediately read the advantage and decide whether to attack, pass, cut, or use the second offensive player."},{"@type":"HowToStep","name":"Phase 2","text":"The possession can begin with a dribble handoff, ..."},{"@type":"HowToStep","name":"Phase 3","text":""},{"@type":"HowToStep","name":"Phase 4","text":""},{"@type":"HowToStep","name":"Phase 5","text":"... a pass outside the three-point line, or another action chosen by the coach."},{"@type":"HowToStep","name":"Phase 6","text":"After the initial advantage, the players continue with live 2v2 ..."},{"@type":"HowToStep","name":"Phase 7","text":"... until the offense scores, the defense gets a stop, or the coach’s scoring condition is reached.\nConstraints\n1. Limit the offense to a maximum number of dribbles to encourage passing and quick decisions.\n2. Require the offense to attack within a set time limit.\n3. Award bonus points for a score created directly from the initial advantage.\n4. Require both offensive players to touch the ball before a shot.\n5. Vary the starting positions of the second offensive player and the help defender."}]}</script>
