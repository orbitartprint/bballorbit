  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v2 Sandwich","description":"Quick-start 2v2 that forces spacing + defensive communication from a tight alignment.\nMain Goal\nTrain immediate spacing and advantage creation on offense while forcing defenders to communicate, match up, and contain the ball in a live 2v2 s","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/a9493f2e-fafc-4e70-93dc-b6df9416d73a/thumb-1783085407854.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"1. The rep starts as soon as the designated trigger player moves (default: the ball-handler). Once the trigger moves, all four players are live and it becomes a normal 2v2.\n2. Offense must instantly create proper spacing (avoid standing on the same line / same lane), play with pace, and look to create an advantage with cuts, re-spacing, or screens."},{"@type":"HowToStep","name":"Phase 2","text":"Play until a score, stop, or defensive rebound. Reset quickly and rotate positions/roles."},{"@type":"HowToStep","name":"Phase 3","text":"Constraints\n1. Trigger variations: Start on the movement of (a) ball-handler, (b) offensive player without the ball, (c) X1, or (d) X2. (Pick one and run 3–5 reps.)\n2. Finishing constraint: Offense must finish with a layup (no jump shots).\n3. pacing rule: On the catch or after the first drive, the off-ball offensive player must 're-space' to a clear window (corner/slot/dunker spot) — no standing within 2 meters of the ball.\n4. Screens allowed: Offense may set on-ball screens.\n5. Ball-handler has max 2-3 dribbles before a shot or a pass.\n6. Time pressure: Shot must happen within 5 seconds after the trigger movement."}]}</script>
