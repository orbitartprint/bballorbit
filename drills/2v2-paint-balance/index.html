  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v2 Paint Balance","description":"Halfcourt 2v2 with defensive inside-outside rule and offensive spacing constraints.\nMain Goal\nTrain offensive spacing and quick advantage creation under time pressure, while forcing the defense to constantly balance paint protection and per","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/c7435c33-870d-4c39-ae27-ffdbc7bb12ca/thumb-1782997736485.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"If one defender steps into the paint, the other defender must immediately leave it. They must constantly adjust their positioning to maintain inside-outside balance."},{"@type":"HowToStep","name":"Phase 2","text":"The offense plays normal 2v2 but must recognize which defender is protecting the paint and which one is pressuring outside."},{"@type":"HowToStep","name":"Phase 3","text":"The goal for the offense is to create quick advantages before the defense can properly rotate and rebalance."},{"@type":"HowToStep","name":"Phase 4","text":"Play until a score, stop, or shot-clock violation, then switch roles."},{"@type":"HowToStep","name":"Phase 5","text":"Constraints\n1. Offensive half restriction: One offensive player may only operate on the left side of the court, the other only on the right side (no crossing the middle).\n2. Catch rule: Offensive players may only receive the ball outside the three-point line.\n3. Scoring system: Three-pointers = 3 points; any 2-point field goal = 1 point (reward spacing and outside shooting).\n4. Time constraint: Offense has 6–8 seconds to complete each possession.\n5. Dribble limit: Max 3 dribbles per player to increase ball movement and decision speed."}]}</script>
