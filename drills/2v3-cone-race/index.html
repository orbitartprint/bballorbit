  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v3 Cone Race","description":"Transition-based 2v3 SSG to train early advantage recognition and decision making.\nMain Goal\nTeach offensive players to recognize and exploit temporary advantages under time pressure, while training defenders to recover, communicate, and st","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/98b99752-9812-4801-9d7b-32ef5a6459e4/thumb-1783025254197.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"The drill starts when the ball-handler moves. At that moment, all players sprint to their assigned cone, circle it, and then re-enter the court."},{"@type":"HowToStep","name":"Phase 2","text":"After clearing their cone, the game becomes live and is played as a 2v3 small-sided game."},{"@type":"HowToStep","name":"Phase 3","text":"By adjusting the cone or player placement, the coach can create different game situations: a short-term offensive advantage, immediate ball pressure, or a strong spacing challenge for the offense."},{"@type":"HowToStep","name":"Phase 4","text":"Constraints\n1. Cone placement – temporary advantage: Place defensive cones farther away to give the offense a brief 2v1 or advantage window after the start.\n2. Cone placement – ball pressure: Place two defensive cones close to the ball-handler’s path to create immediate pressure and force early decisions.\n3. Spacing constraint: Both offensive players start very close together and must immediately spread to different lanes (corner / slot / dunker spot).\n4. Finishing constraint: Offense must attempt a shot within 5–6 seconds.\n5. Defensive focus: Defense must stop the ball without fouling; add a rule that the first defender cannot switch assignments until the second defender recovers.\n6. Progression: Limit dribbles (max 3) or restrict scoring to layups and paint finishes."}]}</script>
