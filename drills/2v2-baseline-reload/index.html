  <script type="application/ld+json">{"@context":"https://schema.org","@type":"HowTo","name":"2v2 Baseline Reload","description":"Continuous 2-on-2 Baseline Transition Drill.\nMain Goal\nDevelop fast transition reactions, continuous play, and defensive communication under pressure.\nSetup\n1. Start with two offensive players and two defenders playing live 2-on-2.\n2. Two a","image":"https://oxavwwowalaepqxygzkt.supabase.co/storage/v1/object/public/library-media/af32f12f-e554-4870-845b-71edd8415411/2ca632f2-0aa9-4daa-a3fc-94c9879c5a8f/thumb-a04f2dccbcb67d53e5e098e012a1cb8a060931712fbc4aeb0f54befe2e2db64c.png","step":[{"@type":"HowToStep","name":"Phase 1","text":"Limit each possession to a single shot attempt to keep the tempo high."},{"@type":"HowToStep","name":"Phase 2","text":"After a (missed) shot or turnover, one of the waiting players behind the baseline grabs the ball and attacks the other basket with their teammate."},{"@type":"HowToStep","name":"Phase 3","text":"The former offensive players instantly switch to defense, while the original defenders step off and wait behind the baseline for their next turn."},{"@type":"HowToStep","name":"Phase 4","text":"The drill continues in a fast, back-and-forth rhythm with constant possession changes and no breaks."},{"@type":"HowToStep","name":"Phase 5","text":""},{"@type":"HowToStep","name":"Phase 6","text":""},{"@type":"HowToStep","name":"Phase 7","text":"Constraints\n1. Vary the starting spots of the waiting players.\n2. Adjust the court size — for example, play only on one side of the floor.\n3. Limit the time allowed for each offensive possession.\n4. Disallow passes within the backcourt to increase tempo and decision-making speed.\n5. Offensive player who last touched the ball must touch sideline before defending."}]}</script>
